services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-banco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_banco
      POSTGRES_USER: sistema_banco
      POSTGRES_PASSWORD: sistema_banco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:

